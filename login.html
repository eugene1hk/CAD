<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Secure Terminal Login</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .login-container {
            background: #121212;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            width: 380px;
            padding: 40px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            text-align: center;
        }

        .logo {
            width: 80px;
            border-radius: 50%;
            border: 2px solid #3c6e71;
            margin-bottom: 20px;
        }

        .dept-header {
            color: #3c6e71;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 8px;
            display: block;
        }

        h2 {
            font-size: 1.5rem;
            margin: 0 0 35px 0;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.65rem;
            color: #555;
            margin-bottom: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: #080808;
            border: 1px solid #222;
            border-radius: 4px;
            color: #fff;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        input:focus {
            border-color: #3c6e71;
            background: #0f0f0f;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: #2b3a67;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #3c6e71;
            box-shadow: 0 0 15px rgba(60, 110, 113, 0.3);
        }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            font-size: 0.7rem;
            color: #444;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #777;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img src="LRPC_favicon_test.jpeg" class="logo" alt="Logo">
        
        <span id="dept-name-display" class="dept-header">SECURE ACCESS</span>
        <h2 id="login-title">Terminal Login</h2>

        <form id="loginForm">
            <div class="input-group">
                <label for="username">USER:</label>
                <input type="text" id="username" placeholder="Firstname Lastname" required>
            </div>
            
            <div class="input-group">
                <label for="callsign">CALL-SIGN:</label>
                <input type="text" id="callsign" placeholder="e.g. 1-ALPHA-01" required>
            </div>

            <div class="input-group">
                <label for="password">PASSWORD:</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-login">Authorize Access</button>
        </form>

        <a href="option.html" class="back-btn">Cancel Authorization</a>
    </div>

    <script>
        // Retrieve chosen department data
        const deptId = localStorage.getItem("selected_dept_id");
        const deptName = localStorage.getItem("selected_dept_name");
        const deptUrl = localStorage.getItem("selected_dept_url");

        // If no department is selected (direct URL access), go back
        if (!deptId) {
            window.location.href = 'option.html';
        } else {
            document.getElementById("dept-name-display").innerText = deptName;
        }

        // Handle Form
        document.getElementById("loginForm").onsubmit = function(e) {
            e.preventDefault();
            
            // Store session info (Optional: useful for showing the name inside the MDT)
            localStorage.setItem("active_user", document.getElementById("username").value);
            localStorage.setItem("active_callsign", document.getElementById("callsign").value);

            // Redirect to the actual page
            window.location.href = deptUrl;
        };
    </script>
</body>
</html>
