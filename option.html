<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LRP | Master Backend</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        .sidebar { width: 240px; background: #1a1a1a; padding: 20px; border-right: 1px solid #333; }
        .nav-btn { width: 100%; padding: 12px; margin: 4px 0; background: none; border: none; color: #888; text-align: left; cursor: pointer; border-radius: 5px; }
        .nav-btn.active { background: #2b3a67; color: white; }
        .panel { flex: 1; padding: 40px; overflow-y: auto; display: none; }
        .panel.active { display: block; }
        .card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .slider-wrap { flex: 1; margin: 0 20px; }
        input[type="range"] { width: 100%; }
        .num-box { width: 60px; background: #000; border: 1px solid #444; color: #4ade80; text-align: center; padding: 5px; }
        .dir-btn { background: #222; border: 1px solid #444; color: white; padding: 5px 10px; cursor: pointer; }
        .dir-btn.active { background: #3c6e71; border-color: #fff; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>STORM BACKEND</h3>
        <button class="nav-btn active" onclick="showTab('controls')">Controls</button>
        <button class="nav-btn" onclick="showTab('admin')">Admin</button>
        <button class="nav-btn" onclick="showTab('database')">Database</button>
        <button class="nav-btn" onclick="showTab('version')">Version</button>
        <br><button onclick="window.location.href='option.html'" style="color: red; background: none; border: none; cursor: pointer;">Exit</button>
    </div>

    <div id="controls" class="panel active">
        <h1>System Controls</h1>
        <div id="dept-locks"></div>

        <h3>Mechanical Speed (Max 10x)</h3>
        <div class="card">
            <span>Touchpad</span>
            <div class="slider-wrap"><input type="range" id="t_slide" min="0.01" max="10" step="0.01" oninput="sync('touch', this.value)"></div>
            <input type="number" id="t_num" class="num-box" onchange="sync('touch', this.value)">
        </div>
        <div class="card">
            <span>Mouse</span>
            <div class="slider-wrap"><input type="range" id="m_slide" min="0.01" max="10" step="0.01" oninput="sync('mouse', this.value)"></div>
            <input type="number" id="m_num" class="num-box" onchange="sync('mouse', this.value)">
        </div>

        <h3>Scroll Linkage</h3>
        <div class="card">
            <span>Scroll UP</span>
            <div>
                <button id="up-left" class="dir-btn" onclick="setLink('up','left')">LEFT</button>
                <button id="up-right" class="dir-btn" onclick="setLink('up','right')">RIGHT</button>
            </div>
        </div>
        <div class="card">
            <span>Scroll DOWN</span>
            <div>
                <button id="down-left" class="dir-btn" onclick="setLink('down','left')">LEFT</button>
                <button id="down-right" class="dir-btn" onclick="setLink('down','right')">RIGHT</button>
            </div>
        </div>
    </div>

    <div id="admin" class="panel"><h1>Admin</h1><p>Global Maintenance controls and logs.</p></div>
    <div id="database" class="panel"><h1>Database</h1><p>Character Encryption Slider Removed.</p></div>
    <div id="version" class="panel">
        <h1>System Version</h1>
        <div class="card">
            <span id="v-string">Version: 1.0.Fetch...</span>
            <span id="c-count">Commits: --</span>
        </div>
    </div>

    <script>
        function showTab(id) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        function sync(type, val) {
            val = Math.min(val, 10);
            localStorage.setItem(`hub_${type}_speed`, val);
            const prefix = type === 'touch' ? 't' : 'm';
            document.getElementById(prefix+'_slide').value = val;
            document.getElementById(prefix+'_num').value = val;
        }

        function setLink(trigger, dir) {
            localStorage.setItem(`hub_dir_${trigger}`, dir);
            document.querySelectorAll(`[id^="${trigger}-"]`).forEach(b => b.classList.remove('active'));
            document.getElementById(`${trigger}-${dir}`).classList.add('active');
        }

        async function getVersion() {
            try {
                // Replace with your actual user/repo
                const res = await fetch('https://api.github.com/repos/YOUR_USER/YOUR_REPO/commits');
                const data = await res.json();
                document.getElementById('v-string').innerText = `Version: 1.0.${data.length}`;
                document.getElementById('c-count').innerText = `Total Commits: ${data.length}`;
            } catch { document.getElementById('v-string').innerText = "Version: 1.0.Local"; }
        }

        window.onload = () => {
            sync('touch', localStorage.getItem('hub_touch_speed') || 1.0);
            sync('mouse', localStorage.getItem('hub_mouse_speed') || 1.0);
            setLink('up', localStorage.getItem('hub_dir_up') || 'right');
            setLink('down', localStorage.getItem('hub_dir_down') || 'left');
            getVersion();

            const depts = [{id:'police', n:'LEO'}, {id:'ems', n:'EMS'}, {id:'dot', n:'DOT'}, {id:'civ', n:'CIV'}];
            document.getElementById('dept-locks').innerHTML = depts.map(d => `
                <div class="card">
                    <span>${d.n} Locked</span>
                    <input type="checkbox" ${localStorage.getItem(d.id+'_locked') === 'true' ? 'checked' : ''} 
                    onchange="localStorage.setItem('${d.id}_locked', this.checked)">
                </div>
            `).join('');
        };
    </script>
</body>
</html>
