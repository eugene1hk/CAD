<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD - MDT</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --panel-bg: #161616;
            --accent-green: #48bb78;
            --accent-red: #f56565;
            --accent-orange: #ed8936;
            --text-main: #cbd5e0;
            --text-dim: #718096;
            --sidebar-width: 75px;
            --header-height: 70px; /* Slimmer header */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Using Inter/system fonts for a cleaner, smaller look */
            font-family: 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
        }

        /* --- HEADER --- */
        header {
            grid-area: header;
            background-color: #111;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-bottom: 1px solid #232323;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            width: 42px;
            height: 42px;
            background: #2d3748;
            border-radius: 4px;
            overflow: hidden;
        }

        .mdt-info {
            font-size: 0.75rem; /* Reduced font size */
            color: var(--text-dim);
            line-height: 1.3;
        }

        .mdt-id { color: #4a5568; font-family: 'Courier New', monospace; font-weight: bold; }

        .header-nav {
            display: flex;
            gap: 5px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 60px;
            font-size: 0.65rem; /* Compact text */
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item i { font-size: 1.2rem; margin-bottom: 2px; }
        .nav-item:hover { color: #fff; }
        
        .status-indicator { color: var(--accent-green); }

        .timestamp {
            font-family: monospace;
            color: #a0aec0;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        /* --- SIDEBAR (Equalized Tabs) --- */
        nav.sidebar {
            grid-area: sidebar;
            background-color: #121212;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #232323;
        }

        .side-btn {
            height: 75px; /* Fixed height to equalize Shift and Laws */
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.7rem;
            transition: 0.2s;
            position: relative;
            border-bottom: 1px solid #1a1a1a;
        }

        .side-btn i { font-size: 1.4rem; margin-bottom: 4px; }
        
        .side-btn.active { 
            color: var(--accent-orange); 
            background: rgba(237, 137, 54, 0.05);
        }

        .side-btn.active::before {
            content: "";
            position: absolute;
            left: 0;
            width: 3px;
            height: 100%;
            background: var(--accent-orange);
        }

        .sidebar-footer {
            margin-top: auto; /* Pushes Discord to bottom */
        }

        /* --- MAIN AREA --- */
        main {
            grid-area: main;
            display: grid;
            grid-template-columns: 1fr 1.3fr;
            background-color: #232323; 
        }

        .panel {
            background-color: var(--bg-dark);
            padding: 20px;
        }

        .panel-title {
            font-size: 1.1rem; /* Smaller, cleaner title */
            font-weight: 500;
            margin-bottom: 20px;
            color: #fff;
        }

        #startShiftBtn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 8px 18px; /* Slimmer button */
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        #startShiftBtn.on-duty { background-color: var(--accent-red); }

        /* --- MAP --- */
        .map-container {
            background-color: #0e0e0e;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            padding: 8px 12px;
            background: #161616;
            font-size: 0.7rem;
            color: var(--text-dim);
            border-bottom: 1px solid #232323;
        }

        .map-image-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .map-image-wrapper img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box">
                <img src="https://via.placeholder.com/42" alt="Logo">
            </div>
            <div class="mdt-info">
                MDT: <span class="mdt-id">b4170f9a-ef31-4a00-99b8-b2690cd5f864</span><br>
                (London Roleplay Community Database)
            </div>
        </div>

        <div class="header-nav">
            <div class="nav-item"><i class='bx bx-radio-circle-marked'></i>Calls</div>
            <div class="nav-item"><i class='bx bx-file'></i>Reports</div>
            <div class="nav-item"><i class='bx bx-receipt'></i>Tickets</div>
            <div class="nav-item"><i class='bx bxs-car'></i>Vehicles</div>
            <div class="nav-item"><i class='bx bxs-user-detail'></i>Search</div>
            <div class="nav-item"><i class='bx bx-info-circle'></i>Info</div>
            <div class="nav-item"><i class='bx bxs-shield-alt-2' style="color: #ecc94b;"></i>Admin</div>
            <div class="nav-item status-indicator"><i class='bx bx-broadcast'></i>Dispatch</div>
        </div>

        <div class="timestamp" id="clock">03-31-2026 13:17:02</div>
    </header>

    <nav class="sidebar">
        <a href="#" class="side-btn active">
            <i class='bx bx-time-five'></i>
            Shift
        </a>
        <a href="#" class="side-btn">
            <i class='bx bx-balance'></i>
            Laws
        </a>
        
        <div class="sidebar-footer">
            <a href="#" class="side-btn" style="border-bottom: none;">
                <i class='bx bxl-discord-alt'></i>
                Server
            </a>
        </div>
    </nav>

    <main>
        <section class="panel">
            <h2 class="panel-title">Shift Management</h2>
            <button id="startShiftBtn">Start Shift</button>
        </section>

        <section class="map-container">
            <div class="map-header">ERLC MAP VIEW</div>
            <div class="map-image-wrapper">
                <img src="https://i.imgur.com/K1n8zI8.png" alt="Map">
            </div>
        </section>
    </main>

    <script>
        const shiftBtn = document.getElementById('startShiftBtn');
        let isOnDuty = false;

        shiftBtn.addEventListener('click', () => {
            isOnDuty = !isOnDuty;
            shiftBtn.innerText = isOnDuty ? "End Shift" : "Start Shift";
            shiftBtn.classList.toggle('on-duty');
        });

        function updateClock() {
            const now = new Date();
            const date = now.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('clock').innerText = `${date} ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
