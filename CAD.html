<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD - MDT</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        :root {
            --bg-dark: #0b0b0b;
            --panel-bg: #1a1a1a;
            --accent-green: #48bb78;
            --accent-red: #f56565;
            --text-main: #e2e8f0;
            --text-dim: #a0aec0;
            --sidebar-width: 70px;
            --header-height: 80px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-areas: 
                "header header"
                "sidebar main";
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
        }

        /* --- HEADER SECTION --- */
        header {
            grid-area: header;
            background-color: #111;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #2d3748;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: #2d3748;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .mdt-info {
            font-size: 0.85rem;
            color: var(--text-dim);
            line-height: 1.4;
        }

        .mdt-id { color: #718096; font-family: monospace; }

        .header-nav {
            display: flex;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 65px;
            font-size: 0.7rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; }
        .nav-item:hover { color: white; }
        
        .status-indicator { color: var(--accent-green); }

        /* --- SIDEBAR SECTION --- */
        nav.sidebar {
            grid-area: sidebar;
            background-color: #151515;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid #2d3748;
        }

        .side-btn {
            width: 100%;
            padding: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.75rem;
            transition: 0.3s;
            position: relative;
        }

        .side-btn i { font-size: 1.6rem; margin-bottom: 5px; }
        .side-btn.active { color: #ed8936; }
        .side-btn.active::before {
            content: "";
            position: absolute;
            left: 0;
            width: 4px;
            height: 80%;
            background: #ed8936;
            border-radius: 0 4px 4px 0;
        }

        /* --- MAIN CONTENT AREA --- */
        main {
            grid-area: main;
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 1px;
            background-color: #2d3748; /* Acts as the border line */
        }

        .panel {
            background-color: var(--bg-dark);
            padding: 30px;
            display: flex;
            flex-direction: column;
        }

        .panel-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        #startShiftBtn {
            background-color: var(--accent-green);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: fit-content;
            transition: transform 0.1s, background 0.2s;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.2);
        }

        #startShiftBtn:active { transform: scale(0.96); }
        #startShiftBtn.on-duty { background-color: var(--accent-red); }

        /* --- MAP SECTION --- */
        .map-container {
            background-color: #111;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        .map-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .map-image-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .map-image-wrapper img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.8));
        }

        .timestamp {
            font-family: monospace;
            color: var(--text-dim);
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div class="logo-box">
                <img src="https://via.placeholder.com/50" alt="Logo">
            </div>
            <div class="mdt-info">
                MDT: <span class="mdt-id">b4170f9a-ef31-4a00-99b8-b2690cd5f864</span><br>
                (London Roleplay Community Database) [Advanced]
            </div>
        </div>

        <div class="header-nav">
            <div class="nav-item"><i class='bx bx-radio-circle-marked'></i>Calls</div>
            <div class="nav-item"><i class='bx bx-file'></i>Reports</div>
            <div class="nav-item"><i class='bx bx-receipt'></i>Tickets</div>
            <div class="nav-item"><i class='bx bxs-car'></i>Vehicle Search</div>
            <div class="nav-item"><i class='bx bxs-user-detail'></i>Person Search</div>
            <div class="nav-item"><i class='bx bx-info-circle'></i>MDT Info</div>
            <div class="nav-item"><i class='bx bxs-shield-alt-2' style="color: #ecc94b;"></i>Supervisor</div>
            <div class="nav-item status-indicator"><i class='bx bx-broadcast'></i>Dispatch</div>
        </div>

        <div class="timestamp" id="clock">03-31-2026 13:17:02</div>
    </header>

    <nav class="sidebar">
        <a href="#" class="side-btn active">
            <i class='bx bx-time-five'></i>
            Shift
        </a>
        <a href="#" class="side-btn">
            <i class='bx bx-balance'></i>
            Laws
        </a>
        <div style="margin-top: auto;">
            <a href="#" class="side-btn">
                <i class='bx bxl-discord-alt'></i>
                Server
            </a>
        </div>
    </nav>

    <main>
        <section class="panel">
            <h2 class="panel-title">Shift Management</h2>
            <button id="startShiftBtn">Start Shift</button>
        </section>

        <section class="map-container">
            <div class="map-header">ERLC Map</div>
            <div class="map-image-wrapper">
                <img src="https://i.imgur.com/K1n8zI8.png" alt="ERLC Map">
            </div>
        </section>
    </main>

    <script>
        // Start/End Shift Toggle
        const shiftBtn = document.getElementById('startShiftBtn');
        let isOnDuty = false;

        shiftBtn.addEventListener('click', () => {
            isOnDuty = !isOnDuty;
            if(isOnDuty) {
                shiftBtn.innerText = "End Shift";
                shiftBtn.classList.add('on-duty');
            } else {
                shiftBtn.innerText = "Start Shift";
                shiftBtn.classList.remove('on-duty');
            }
        });

        // Real-time Clock
        function updateClock() {
            const now = new Date();
            const date = now.toLocaleDateString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit' }).replace(/\//g, '-');
            const time = now.toLocaleTimeString('en-GB', { hour12: false });
            document.getElementById('clock').innerText = `${date} ${time}`;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
