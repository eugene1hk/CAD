<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 250px;
            background-color: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar h3 {
            font-size: 0.8rem;
            margin-top: 10px;
            letter-spacing: 1px;
            text-align: center;
            color: #fff;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 30px;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 12px 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .tab-btn.active { background: #2b3a67; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* Main Content */
        .main-panel { 
            flex-grow: 1; 
            padding: 40px; 
            overflow-y: auto; 
            background-color: #0f0f0f;
        }
        
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        h1 { color: #ffffff; font-size: 1.6rem; margin: 0 0 5px 0; }
        h2 { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 25px; }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .control-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Toggle Switches */
        .switch { position: relative; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(22px); }

        /* Management Button Section */
        .mgmt-section {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }

        .btn-mgmt {
            background: #3c6e71;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
            transition: 0.3s ease;
        }

        .btn-mgmt:hover { background: #2b3a67; transform: translateY(-2px); }

        .btn-exit {
            background: #c0392b; color: white; border: none;
            padding: 12px; border-radius: 5px; cursor: pointer;
            font-weight: bold; margin-top: auto; text-transform: uppercase; font-size: 0.75rem;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="text-align: center;">
            <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 65px; border-radius: 50%; border: 2px solid #3c6e71;">
            <h3>STORM BACKEND</h3>
        </div>
        
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('controls', this)">⚙️ System Controls</button>
            <button class="tab-btn" onclick="switchTab('database', this)">📂 Master Database</button>
            <button class="tab-btn" onclick="switchTab('map', this)">🗺️ Map Editor</button>
            <button class="tab-btn" onclick="switchTab('logs', this)">📜 System Logs</button>
            <button class="tab-btn" onclick="switchTab('settings', this)">🛡️ Settings</button>
        </nav>

        <button class="btn-exit" onclick="window.location.href='option.html'">Exit Terminal</button>
    </div>

    <div class="main-panel">
        
        <div id="controls" class="tab-content active-tab">
            <h1>System Controls</h1>
            
            <h2>Maintenance Mode Management</h2>
            <div class="control-grid" id="dynamic-toggle-container">
                </div>

            <h2>Terminal Structure Management</h2>
            <div class="mgmt-section">
                <p style="color: #888; font-size: 0.85rem; margin-bottom: 20px;">Add or remove departments and update their details.</p>
                <button class="btn-mgmt" onclick="window.location.href='dept.html'">Department Manager</button>
            </div>
        </div>

        <div id="database" class="tab-content"><h1>Master Database</h1></div>
        <div id="map" class="tab-content"><h1>Map Editor</h1></div>
        <div id="logs" class="tab-content"><h1>System Logs</h1></div>
        <div id="settings" class="tab-content"><h1>Settings</h1></div>

    </div>

    <script>
        // MASTER DEPT LIST (Shared with dept.html)
        const defaultDepts = [
            { id: 'police', name: 'Law Enforcement', icon: '🚓', desc: 'Metropolitan Police' },
            { id: 'ems', name: 'Medical/Fire', icon: '🚑', desc: 'L.A.S / L.F.B' },
            { id: 'dot', name: 'DOT Access', icon: '🚧', desc: 'Highways Agency' },
            { id: 'civ', name: 'Civilian Portal', icon: '👤', desc: 'Citizen Registry' }
        ];

        function getDepts() {
            const saved = localStorage.getItem('master_dept_list');
            return saved ? JSON.parse(saved) : defaultDepts;
        }

        // RENDER THE SLIDERS BASED ON CURRENT DEPARTMENTS
        function renderToggles() {
            const list = getDepts();
            const container = document.getElementById('dynamic-toggle-container');
            container.innerHTML = ''; // Clear existing

            list.forEach(dept => {
                const isOnline = localStorage.getItem(dept.id + "_locked") === "false";
                
                const card = document.createElement('div');
                card.className = 'control-card';
                card.innerHTML = `
                    <div>
                        <b>${dept.icon} ${dept.name}</b>
                        <p style="font-size: 0.75rem; color: #666; margin: 0;">${dept.desc}</p>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="${dept.id}_toggle" 
                               ${isOnline ? 'checked' : ''} 
                               onchange="toggleAccess('${dept.id}')">
                        <span class="slider"></span>
                    </label>
                `;
                container.appendChild(card);
            });
        }

        function toggleAccess(deptId) {
            const isChecked = document.getElementById(deptId + '_toggle').checked;
            // checked = online (locked: false), unchecked = maintenance (locked: true)
            localStorage.setItem(deptId + "_locked", isChecked ? "false" : "true");
        }

        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active-tab');
            element.classList.add('active');
        }

        // Initialize on load
        window.onload = renderToggles;
    </script>
</body>
</html>
