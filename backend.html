<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; min-height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background-color: #1a1a1a; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h3 { font-size: 0.8rem; text-align: center; color: #fff; letter-spacing: 1px; }
        .nav-tabs { display: flex; flex-direction: column; gap: 5px; margin-top: 30px; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 12px 15px; text-align: left; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .tab-btn.active { background: #2b3a67; color: #fff; }
        .main-panel { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; } }
        
        h1 { color: #fff; font-size: 1.6rem; }
        h2 { color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin: 20px 0; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .control-card { background: #1a1a1a; border: 1px solid #333; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Speed Selector Styling */
        .speed-track { display: flex; gap: 5px; margin-top: 10px; }
        .speed-opt { flex: 1; background: #333; padding: 8px; border-radius: 4px; text-align: center; cursor: pointer; font-size: 0.7rem; transition: 0.2s; border: 1px solid transparent; }
        .speed-opt.active { background: #3c6e71; border-color: #4ade80; color: white; }

        .switch { position: relative; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(22px); }

        .btn-exit { background: #c0392b; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; margin-top: auto; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="text-align: center;">
            <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 65px; border-radius: 50%; border: 2px solid #3c6e71;">
            <h3>STORM BACKEND</h3>
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('controls', this)">⚙️ System Controls</button>
            <button class="tab-btn" onclick="switchTab('settings', this)">🛡️ Settings</button>
        </nav>
        <button class="btn-exit" onclick="window.location.href='option.html'">Exit Terminal</button>
    </div>

    <div class="main-panel">
        <div id="controls" class="tab-content active-tab">
            <h1>System Controls</h1>
            
            <h2>Input Smoothness & Direction</h2>
            <div class="control-grid">
                <div class="control-card">
                    <div><b>Invert Vertical Scroll</b><p style="font-size:0.7rem; color:#666;">Up/Down moves Left/Right</p></div>
                    <label class="switch">
                        <input type="checkbox" id="scroll_invert" onchange="saveSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="control-card">
                    <div><b>Kinetic Smoothness</b><p style="font-size:0.7rem; color:#666;">Enables non-detent rolling</p></div>
                    <label class="switch">
                        <input type="checkbox" id="scroll_smooth" checked onchange="saveSettings()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <h2>Touchpad Speed (4 Levels)</h2>
            <div class="speed-track" id="touchpad-speeds">
                <div class="speed-opt" onclick="setSpeed('touch', 0.5, this)">Slow</div>
                <div class="speed-opt active" onclick="setSpeed('touch', 1.0, this)">Normal</div>
                <div class="speed-opt" onclick="setSpeed('touch', 2.0, this)">Fast</div>
                <div class="speed-opt" onclick="setSpeed('touch', 4.0, this)">Extreme</div>
            </div>

            <h2>Mouse Wheel Speed (4 Levels)</h2>
            <div class="speed-track" id="mouse-speeds">
                <div class="speed-opt" onclick="setSpeed('mouse', 0.5, this)">Slow</div>
                <div class="speed-opt active" onclick="setSpeed('mouse', 1.0, this)">Normal</div>
                <div class="speed-opt" onclick="setSpeed('mouse', 2.5, this)">Fast</div>
                <div class="speed-opt" onclick="setSpeed('mouse', 5.0, this)">Extreme</div>
            </div>

            <h2>Dynamic Department Toggles</h2>
            <div class="control-grid" id="dynamic-toggle-container" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        function saveSettings() {
            localStorage.setItem('hub_invert', document.getElementById('scroll_invert').checked);
            localStorage.setItem('hub_smooth', document.getElementById('scroll_smooth').checked);
        }

        function setSpeed(type, val, el) {
            localStorage.setItem(`hub_${type}_speed`, val);
            const parent = el.parentElement;
            parent.querySelectorAll('.speed-opt').forEach(opt => opt.classList.remove('active'));
            el.classList.add('active');
        }

        function loadSettings() {
            const invert = localStorage.getItem('hub_invert') === "true";
            const smooth = localStorage.getItem('hub_smooth') !== "false"; // default true
            document.getElementById('scroll_invert').checked = invert;
            document.getElementById('scroll_smooth').checked = smooth;
            
            // Render depts...
            const depts = JSON.parse(localStorage.getItem('master_dept_list')) || [];
            const container = document.getElementById('dynamic-toggle-container');
            container.innerHTML = depts.map(d => `
                <div class="control-card">
                    <div><b>${d.icon} ${d.name}</b></div>
                    <label class="switch">
                        <input type="checkbox" ${localStorage.getItem(d.id+'_locked') === 'false' ? 'checked' : ''} 
                        onchange="localStorage.setItem('${d.id}_locked', !this.checked)">
                        <span class="slider"></span>
                    </label>
                </div>
            `).join('');
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            btn.classList.add('active');
        }

        window.onload = loadSettings;
    </script>
</body>
</html>
