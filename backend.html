<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC | Master Backend Control</title>
    <style>
        /* Sonoran CAD Black Aesthetic */
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 240px;
            background-color: #1a1a1a;
            height: 100vh;
            border-right: 1px solid #333;
            padding: 20px;
        }

        .main-panel {
            flex-grow: 1;
            padding: 30px;
        }

        h1 { color: #ffffff; font-size: 1.5rem; margin-bottom: 30px; }
        h2 { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }

        /* The Dashboard Grid */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .control-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- THE TOGGLE SWITCH (Circle in Semi-Circle) --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px; /* Makes it the "semi-circle" track */
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%; /* The "Circle" inside */
        }

        input:checked + .slider { background-color: #2ecc71; } /* Green when on */
        input:checked + .slider:before { transform: translateX(24px); }

        .status-label { font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color: #fff;">LRPC STORM CAD ADMIN</h2>
        <p style="color: #666; font-size: 0.8rem;">System Version 1.0.4</p>
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">
        <button onclick="window.location.href='option.html'" style="background:none; border:1px solid #444; color:white; cursor:pointer; padding:5px 10px; width:100%;">Return to Hub</button>
    </div>

    <div class="main-panel">
        <h1>Master System Control</h1>
        
        <div class="control-grid">
            <div class="control-card">
                <div>
                    <span class="status-label">Police MDT Access</span>
                    <p style="font-size: 0.8rem; color: #666; margin: 5px 0 0 0;">Toggle Law Enforcement Bubble</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="police_toggle" onchange="updateAccess('police')">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-card">
                <div>
                    <span class="status-label">EMS/Fire Access</span>
                    <p style="font-size: 0.8rem; color: #666; margin: 5px 0 0 0;">Toggle Medical Bubble</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="ems_toggle" onchange="updateAccess('ems')">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="control-card">
                <div>
                    <span class="status-label">Civilian Portal</span>
                    <p style="font-size: 0.8rem; color: #666; margin: 5px 0 0 0;">Toggle Character Management</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="civ_toggle" onchange="updateAccess('civ')">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid #333; padding-top: 20px;">
            <h2>System Logs</h2>
            <p style="color: #555; font-style: italic;">No recent system changes detected.</p>
        </div>
    </div>

    <script>
        // Load existing states on page open
        window.onload = function() {
            const depts = ['police', 'ems', 'civ'];
            depts.forEach(dept => {
                // Check if it was saved as "locked"
                const isLocked = localStorage.getItem(dept + "_locked") === "true";
                // If it is NOT locked, check the switch to "ON"
                document.getElementById(dept + '_toggle').checked = !isLocked;
            });
        };

        function updateAccess(dept) {
            const isChecked = document.getElementById(dept + '_toggle').checked;
            // If switch is ON, locked is FALSE. If switch is OFF, locked is TRUE.
            localStorage.setItem(dept + "_locked", !isChecked);
            console.log(dept + " is now " + (isChecked ? "ONLINE" : "OFFLINE"));
        }
    </script>
</body>
</html>
