<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        :root { --bg: #121417; --card: #1c1f26; --accent: #3c6e71; --text: #d1d5db; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 250px; background-color: #181b20; border-right: 1px solid #2d333b; padding: 20px; display: flex; flex-direction: column; }
        .nav-tabs { display: flex; flex-direction: column; gap: 4px; margin-top: 30px; }
        .tab-btn { background: transparent; color: #6b7280; border: none; padding: 10px 15px; text-align: left; border-radius: 8px; cursor: pointer; font-size: 0.85rem; transition: 0.2s; }
        .tab-btn.active { background: #232a35; color: #fff; font-weight: 600; }
        .tab-btn:hover { background: #1f242d; }

        .main-panel { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; animation: fadeIn 0.2s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        h1 { color: #fff; font-size: 1.4rem; font-weight: 500; margin-bottom: 20px; }
        h2 { color: #4b5563; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; margin: 30px 0 15px 0; border-bottom: 1px solid #2d333b; padding-bottom: 5px; }

        .control-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .control-card { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .setting-row { background: var(--card); padding: 15px 20px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 20px; }
        
        .btn-action { background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.2s; }
        .btn-action:hover { opacity: 0.9; }

        .slider-ctrl { flex: 2; -webkit-appearance: none; height: 3px; background: #374151; border-radius: 5px; }
        .slider-ctrl::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; background: var(--accent); border-radius: 50%; cursor: pointer; }
        .num-input { width: 60px; background: #000; border: 1px solid #374151; color: #4ade80; padding: 4px; border-radius: 4px; text-align: center; }

        .dir-container { display: flex; gap: 4px; background: #111; padding: 4px; border-radius: 8px; }
        .dir-btn { border: none; background: transparent; color: #4b5563; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: 700; }
        .dir-btn.active { background: var(--accent); color: white; }

        .switch { position: relative; width: 36px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #374151; transition: .3s; border-radius: 20px; }
        .toggle-slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .toggle-slider { background-color: #10b981; }
        input:checked + .toggle-slider:before { transform: translateX(18px); }
        .btn-exit { background: #7f1d1d; color: #fecaca; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: auto; font-size: 0.7rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="text-align: center;">
            <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 50px; border-radius: 50%; opacity: 0.8;">
            <h3 style="font-size: 0.9rem; letter-spacing: 1px; color: #9ca3af;">STORM OS</h3>
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('controls', this)">System Settings</button>
            <button class="tab-btn" onclick="switchTab('admin', this)">Admin Access</button>
            <button class="tab-btn" onclick="switchTab('database', this)">Data Registry</button>
            <button class="tab-btn" onclick="switchTab('version', this)">Version Info</button>
        </nav>
        <button class="btn-exit" onclick="window.location.href='option.html'">TERMINATE SESSION</button>
    </div>

    <div class="main-panel">
        <div id="controls" class="tab-content active-tab">
            <h1>Input & Access</h1>
            <h2>Department Locks</h2>
            <div class="control-grid" id="dynamic-toggle-container"></div>
            
            <h2 style="margin-top:40px;">Mechanical Profiles</h2>
            <div class="setting-row">
                <div style="flex:1; font-size:0.85rem;">Touchpad Multiplier</div>
                <input type="range" id="touch_slide" class="slider-ctrl" min="0.01" max="10" step="0.01" oninput="updateSpeed('touch', this.value)">
                <input type="number" id="touch_num" class="num-input" min="0.01" max="10" onchange="updateSpeed('touch', this.value)">
            </div>
            <div class="setting-row">
                <div style="flex:1; font-size:0.85rem;">Mouse Multiplier</div>
                <input type="range" id="mouse_slide" class="slider-ctrl" min="0.01" max="10" step="0.01" oninput="updateSpeed('mouse', this.value)">
                <input type="number" id="mouse_num" class="num-input" min="0.01" max="10" onchange="updateSpeed('mouse', this.value)">
            </div>

            <div class="control-grid">
                <div class="control-card">
                    <div style="font-size:0.8rem;">Scroll UP Linkage</div>
                    <div class="dir-container">
                        <button id="up-left" class="dir-btn" onclick="setLinkage('up', 'left')">LEFT</button>
                        <button id="up-right" class="dir-btn" onclick="setLinkage('up', 'right')">RIGHT</button>
                    </div>
                </div>
                <div class="control-card">
                    <div style="font-size:0.8rem;">Scroll DOWN Linkage</div>
                    <div class="dir-container">
                        <button id="down-left" class="dir-btn" onclick="setLinkage('down', 'left')">LEFT</button>
                        <button id="down-right" class="dir-btn" onclick="setLinkage('down', 'right')">RIGHT</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="admin" class="tab-content"><h1>Admin Panel</h1><button class="btn-action" onclick="window.location.href='dept.html'">Manage Departments</button></div>
        <div id="database" class="tab-content"><h1>Database</h1><button class="btn-action" onclick="window.location.href='database.html'">Open Registry</button></div>
        <div id="version" class="tab-content"><h1>System Info</h1><p id="v-tag">Fetching...</p></div>
    </div>

    <script>
        function updateSpeed(type, val) {
            val = Math.min(Math.max(parseFloat(val), 0.01), 10).toFixed(2);
            localStorage.setItem(`hub_${type}_speed`, val);
            document.getElementById(`${type}_slide`).value = val;
            document.getElementById(`${type}_num`).value = val;
        }

        function setLinkage(trigger, dir) {
            localStorage.setItem(`hub_dir_${trigger}`, dir);
            refreshUI();
        }

        function refreshUI() {
            const up = localStorage.getItem('hub_dir_up') || 'right';
            const down = localStorage.getItem('hub_dir_down') || 'left';
            document.querySelectorAll('.dir-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`up-${up}`).classList.add('active');
            document.getElementById(`down-${down}`).classList.add('active');
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active-tab');
            btn.classList.add('active');
        }

        window.onload = () => {
            updateSpeed('touch', localStorage.getItem('hub_touch_speed') || 1.0);
            updateSpeed('mouse', localStorage.getItem('hub_mouse_speed') || 1.0);
            refreshUI();
            
            const depts = JSON.parse(localStorage.getItem('master_dept_list')) || [
                { id: 'police', name: 'LEO', icon: '🚓' },
                { id: 'ems', name: 'EMS', icon: '🚑' },
                { id: 'dot', name: 'DOT', icon: '🚧' },
                { id: 'civ', name: 'CIV', icon: '👤' }
            ];
            const container = document.getElementById('dynamic-toggle-container');
            container.innerHTML = depts.map(d => `
                <div class="control-card">
                    <div style="font-size:0.85rem;"><b>${d.icon} ${d.name}</b></div>
                    <label class="switch">
                        <input type="checkbox" ${localStorage.getItem(d.id+'_locked') === 'false' ? 'checked' : ''} 
                        onchange="localStorage.setItem('${d.id}_locked', !this.checked)">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
