<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Welcome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Keeps the home screen clean */
        }

        .welcome-box {
            text-align: center;
            padding: 60px;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        .logo-main {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid #3c6e71;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(60, 110, 113, 0.5);
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.7;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .enter-terminal-btn {
            background: #2b3a67;
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.4s;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .enter-terminal-btn:hover {
            background: #3c6e71;
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(60, 110, 113, 0.6);
        }

        /* Subtle Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decorative Background Circles */
        .bg-circle {
            position: absolute;
            z-index: -1;
            background: rgba(255,255,255,0.03);
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="bg-circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="bg-circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>

    <div class="welcome-box">
        <img src="LRPC_favicon_test.jpeg" alt="LRP Logo" class="logo-main">
        
        <h1>LRPC COMMUNITY</h1>
        <p class="subtitle">Secure Data Management Terminal</p>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 40px;">
        
        <button class="enter-terminal-btn" onclick="window.location.href='option.html'">
            Initialize Terminal
        </button>
        
        <p style="margin-top: 30px; font-size: 0.7rem; opacity: 0.4;">
            SYSTEM VERSION 1.0.4 // AUTHORIZED ACCESS ONLY
        </p>
    </div>

</body>
</html>
