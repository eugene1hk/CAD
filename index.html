<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP CAD | Main Terminal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header style="padding: 20px; text-align: center; background: rgba(0,0,0,0.2);">
        <h1>LONDON ROLEPLAY COMMUNITY</h1>
        <p>Main Dispatch & Data Terminal</p>
    </header>

    <main style="padding: 20px; max-width: 1200px; margin: auto; width: 100%;">
        
        <div class="card">
            <h2>Welcome, Officer</h2>
            <p>Select a department to initialize the terminal sessions.</p>
        </div>

        <div class="grid-container" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px;">
            
            <div class="card sonoran-btn" onclick="location.href='police.html'">
                <div style="font-size: 2em;">🚓</div>
                <h3>Police MDT</h3>
            </div>

            <div class="card sonoran-btn" onclick="location.href='civ.html'">
                <div style="font-size: 2em;">👤</div>
                <h3>Civilian Menu</h3>
            </div>

            <div class="card sonoran-btn" onclick="location.href='dispatch.html'">
                <div style="font-size: 2em;">🎙️</div>
                <h3>Dispatch</h3>
            </div>

        </div>

    </main>

    <script src="main.js"></script>
</body>
</html>
