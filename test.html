<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header-section {
            text-align: center;
            margin-top: 50px;
            flex-shrink: 0;
        }
        .header-section img { width: 100px; border-radius: 50%; border: 3px solid #3c6e71; }
        .header-section h1 { margin-top: 15px; letter-spacing: 3px; font-size: 1.8em; }
        .header-section p { opacity: 0.6; }

        /* SCROLL AREA - Pulled UP */
        .selection-wrapper {
            width: 90%;
            margin: 30px auto 0 auto;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 10px; 
            flex-shrink: 0;
            z-index: 10;
        }

        .selection-wrapper::-webkit-scrollbar { height: 5px; }
        .selection-wrapper::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.01); }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }

        .selection-container {
            display: flex;
            gap: 25px;
            padding: 10px 40px;
            min-width: min-content;
        }

        /* 0.8x SCALED BOX */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px; 
            width: 224px;      
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        /* Hover Effect for Online Cards */
        .login-card:not(.disabled):hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #3c6e71;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* OFFLINE CARD STYLE (No Filter, just colors) */
        .login-card.disabled {
            background: rgba(40, 40, 40, 0.4); /* Darker, flatter background */
            border-color: rgba(255, 255, 255, 0.05);
            cursor: not-allowed;
        }

        .icon-circle {
            width: 70px; height: 70px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-size: 2.2em;
        }

        /* Dim icons only on disabled cards */
        .disabled .icon-circle { opacity: 0.3; }

        .card-title { font-size: 1.25em; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .card-desc { font-size: 0.85em; opacity: 0.6; margin-bottom: 15px; height: 40px; line-height: 1.3;}

        .status-tag {
            font-size: 0.75em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
        }

        .btn-enter {
            margin-top: 15px; padding: 10px 35px;
            border-radius: 30px; border: none;
            background: #2b3a67; color: white;
            font-weight: bold; text-transform: uppercase;
            cursor: pointer; font-size: 0.8em;
            transition: 0.2s;
        }
        .btn-enter:hover { background: #3c6e71; }

        .admin-secret-btn {
            position: fixed; bottom: 10px; left: 10px;
            width: 14px; height: 14px;
            background: #dc3545; border: none; border-radius: 50%;
            cursor: pointer; opacity: 0.2; z-index: 1000;
        }

        .bottom-spacer { flex-grow: 1; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>TERMINAL ACCESS</h1>
        <p>Select your department to begin your session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container"></div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        // RESTORED STABLE SYNCED SCROLL
        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                const isMouse = Math.abs(e.deltaY) >= 100;
                // 1.4x Speed Multipliers
                const scrollSpeed = isMouse ? 210 : Math.abs(e.deltaY) * 11;
                const direction = e.deltaY > 0 ? 1 : -1;

                scrollContainer.scrollLeft -= (direction * scrollSpeed);
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const depts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
            ];
            
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ● ${isLocked ? 'Maintenance In Progress' : 'System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }
        window.onload = renderHub;
    </script>
</body>
</html>
