<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body { background-color: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden;}
        
        .header-section { text-align: center; margin-top: 60px; margin-bottom: 20px; }
        
        /* SCROLL CONTAINER */
        .selection-wrapper {
            width: 100%;
            overflow-x: auto; /* The scrollbar trigger */
            padding-bottom: 30px;
            display: flex;
            justify-content: flex-start; /* Aligns cards to left when scrolling starts */
        }

        /* Custom Scrollbar Styling */
        .selection-wrapper::-webkit-scrollbar { height: 8px; }
        .selection-wrapper::-webkit-scrollbar-track { background: #000; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #2b3a67; border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb:hover { background: #3c6e71; }

        .selection-container {
            display: flex; /* Changed from Grid to Flex for horizontal scroll */
            gap: 25px;
            padding: 20px 40px;
            min-width: min-content; /* Critical for scrolling */
            margin: 0 auto;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px; /* Fixed width so they line up */
            flex-shrink: 0; /* Prevents cards from squishing */
        }

        .login-card:not(.disabled):hover { transform: translateY(-10px); border-color: #3c6e71; background: rgba(255, 255, 255, 0.1); }
        .icon-circle { width: 80px; height: 80px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 2.5em; }
        .card-title { font-size: 1.2em; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;}
        .card-desc { font-size: 0.85em; opacity: 0.6; margin-bottom: 15px; height: 40px; }
        
        .btn-enter { padding: 10px 30px; border-radius: 30px; border: none; background: #2b3a67; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .disabled { opacity: 0.4; filter: grayscale(1); }
        .status-tag { font-size: 0.7em; font-weight: bold; margin-top: 10px; }
        
        .admin-secret-btn { position: fixed; bottom: 10px; left: 10px; width: 12px; height: 12px; background: #dc3545; border: none; border-radius: 50%; cursor: pointer; opacity: 0.2; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 100px; border-radius: 50%; border: 3px solid #3c6e71;">
        <h1 style="letter-spacing: 4px;">TERMINAL ACCESS</h1>
        <p style="opacity: 0.7;">Dynamic Department Selection</p>
    </div>

    <div class="selection-wrapper">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];

            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const container = document.getElementById('main-container');
            
            container.innerHTML = ""; // Clear existing

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance Mode' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
