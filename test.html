<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=0.8; initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            flex-shrink: 0;
        }
        .header-section img { width: 90px; border-radius: 50%; border: 3px solid #3c6e71; }
        .header-section h1 { margin-top: 15px; letter-spacing: 3px; font-size: 1.6em; }
        .header-section p { opacity: 0.6; font-size: 0.85em; }

        .selection-wrapper {
            width: 90%;
            margin: 20px auto 0 auto;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px; 
            flex-shrink: 0;
        }

        .selection-wrapper::-webkit-scrollbar { height: 4px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }

        .selection-container {
            display: flex;
            gap: 25px;
            padding: 20px 40px;
            min-width: min-content;
        }

        /* CONTAINER FOR CARD + FLOATING TEXT */
        .card-wrapper {
            position: relative; /* This allows the yellow text to 'float' on top */
            width: 224px;       /* 0.8x of 280px */
            flex-shrink: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px; 
            width: 100%;
            transition: all 0.3s ease;
        }

        /* Gray out only the card when disabled */
        .login-card.disabled {
            filter: grayscale(1) brightness(0.5);
            opacity: 0.7;
            cursor: not-allowed;
        }

        .login-card:not(.disabled):hover {
            transform: translateY(-8px);
            border-color: #3c6e71;
            background: rgba(255, 255, 255, 0.1);
        }

        .icon-circle {
            width: 60px; height: 60px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; font-size: 1.8em;
        }

        .card-title { font-size: 1.1em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-desc { font-size: 0.8em; opacity: 0.6; margin-bottom: 15px; height: 35px; line-height: 1.3;}

        /* THE YELLOW STATUS TAG - MOVED TO TOP LAYER */
        .status-tag {
            position: absolute;
            bottom: 35px; /* Adjust based on where you want it inside the box */
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none; /* Let clicks pass through to the card */
            z-index: 999; /* Forces it above all filters */
        }

        .yellow-text {
            color: #ffbc00 !important;
            text-shadow: 0px 0px 8px rgba(0, 0, 0, 0.8);
        }

        .green-text {
            color: #4ade80 !important;
        }

        .btn-enter {
            margin-top: 15px; padding: 8px 30px;
            border-radius: 25px; border: none;
            background: #2b3a67; color: white;
            font-weight: bold; text-transform: uppercase;
            cursor: pointer; font-size: 0.75em;
            transition: 0.2s;
            position: relative;
            z-index: 1000;
        }
        .btn-enter:hover { background: #3c6e71; }

        .admin-secret-btn {
            position: fixed; bottom: 10px; left: 10px;
            width: 12px; height: 12px;
            background: #dc3545; border: none; border-radius: 50%;
            cursor: pointer; opacity: 0.2; z-index: 1000;
        }

        .bottom-spacer { flex-grow: 1; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="LRP Logo">
        <h1>TERMINAL ACCESS</h1>
        <p>Select your department to begin your session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container"></div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                const isMouse = Math.abs(e.deltaY) >= 100;
                const scrollSpeed = isMouse ? 180 : Math.abs(e.deltaY) * 9;
                const direction = e.deltaY > 0 ? 1 : -1;
                scrollContainer.scrollLeft -= (direction * scrollSpeed);
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const depts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
            ];
            
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                
                // We create a wrapper so the text can float independently of the card's filter
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                
                wrapper.innerHTML = `
                    <div class="login-card ${isLocked ? 'disabled' : ''}">
                        <div class="icon-circle">${dept.icon}</div>
                        <div class="card-title">${dept.name}</div>
                        <div class="card-desc">${dept.desc}</div>
                        ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                    </div>
                    <div class="status-tag ${isLocked ? 'yellow-text' : 'green-text'}">
                        ● ${isLocked ? 'Maintenance In Progress' : 'System Online'}
                    </div>
                `;
                mainDiv.appendChild(wrapper);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }
        window.onload = renderHub;
    </script>
</body>
</html>
