<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background-color: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 30px;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 12px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .tab-btn:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .tab-btn.active { background: #2b3a67; color: #fff; }

        /* Main Content */
        .main-panel { flex-grow: 1; padding: 40px; }
        
        /* Hide all tabs by default EXCEPT the one we want seen */
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; }

        h1 { color: #ffffff; font-size: 1.6rem; margin-bottom: 25px; }
        h2 { color: #666; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }

        /* Toggles */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .control-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #2ecc71; }
        input:checked + .slider:before { transform: translateX(24px); }

        .btn-exit {
            background: #c0392b; color: white; border: none;
            padding: 12px; border-radius: 5px; cursor: pointer;
            font-weight: bold; margin-top: auto;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="text-align: center;">
            <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 65px; border-radius: 50%; border: 2px solid #3c6e71;">
            <h3 style="font-size: 0.8rem; margin-top: 10px;">SYSTEM ADMIN</h3>
        </div>
        
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('controls', this)">⚙️ Controls</button>
            <button class="tab-btn" onclick="switchTab('logs', this)">📜 Logs</button>
            <button class="tab-btn" onclick="switchTab('settings', this)">🛡️ Settings</button>
        </nav>

        <button class="btn-exit" onclick="window.location.href='index.html'">Exit to Hub</button>
    </div>

    <div class="main-panel">
        
        <div id="controls" class="tab-content active-tab">
            <h1>Master Access Controls</h1>
            <h2>Department Status</h2>
            <div class="control-grid">
                <div class="control-card">
                    <div><b>Police MDT</b><p style="font-size: 0.8rem; color: #666; margin: 0;">Met Police</p></div>
                    <label class="switch"><input type="checkbox" id="police_toggle" onchange="toggle('police')"><span class="slider"></span></label>
                </div>
                <div class="control-card">
                    <div><b>Medical/Fire</b><p style="font-size: 0.8rem; color: #666; margin: 0;">Ambulance/Fire</p></div>
                    <label class="switch"><input type="checkbox" id="ems_toggle" onchange="toggle('ems')"><span class="slider"></span></label>
                </div>
                <div class="control-card">
                    <div><b>DOT Access</b><p style="font-size: 0.8rem; color: #666; margin: 0;">Highways</p></div>
                    <label class="switch"><input type="checkbox" id="dot_toggle" onchange="toggle('dot')"><span class="slider"></span></label>
                </div>
                <div class="control-card">
                    <div><b>Civilian Portal</b><p style="font-size: 0.8rem; color: #666; margin: 0;">DMV</p></div>
                    <label class="switch"><input type="checkbox" id="civ_toggle" onchange="toggle('civ')"><span class="slider"></span></label>
                </div>
            </div>
        </div>

        <div id="logs" class="tab-content">
            <h1>System Logs</h1>
            <div style="background: #1a1a1a; padding: 20px; border-radius: 8px; font-family: monospace; color: #888;">
                [SYSTEM] All services operational...
            </div>
        </div>

        <div id="settings" class="tab-content">
            <h1>Server Settings</h1>
            <p>Database and API configurations are locked.</p>
        </div>

    </div>

    <script>
        // TAB SWITCHING
        function switchTab(tabId, element) {
            // Hide all content
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(c => c.classList.remove('active-tab'));
            
            // Remove active style from buttons
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(b => b.classList.remove('active'));

            // Show current
            document.getElementById(tabId).classList.add('active-tab');
            element.classList.add('active');
        }

        // LOAD STATES
        window.onload = function() {
            ['police', 'ems', 'dot', 'civ'].forEach(dept => {
                const isOnline = localStorage.getItem(dept + "_locked") === "false";
                document.getElementById(dept + '_toggle').checked = isOnline;
            });
        };

        // SAVE STATES
        function toggle(dept) {
            const isChecked = document.getElementById(dept + '_toggle').checked;
            localStorage.setItem(dept + "_locked", isChecked ? "false" : "true");
        }
    </script>
</body>
</html>
