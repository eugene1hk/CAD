<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        * { box-sizing: border-box; }

        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* This spacer pushes the content down from the top */
        .top-spacer { flex: 0 0 10vh; }

        .header-section { 
            text-align: center; 
            flex-shrink: 0;
            padding: 0 20px;
        }
        
        .header-section img {
            width: clamp(60px, 8vh, 100px); /* Scales logo based on screen height */
            border-radius: 50%; 
            border: 2px solid #3c6e71;
            margin-bottom: 1vh;
        }

        .header-section h1 { 
            margin: 5px 0; 
            font-size: clamp(1.5rem, 4vh, 2.5rem); /* Text scales with screen size */
            letter-spacing: 5px; 
            text-transform: uppercase;
        }
        
        .header-section p { 
            margin: 0; 
            font-size: clamp(0.8rem, 1.5vh, 1rem);
            opacity: 0.6; 
        }
        
        /* THE SELECTION WRAPPER */
        .selection-wrapper {
            width: 85%; 
            margin: 4vh auto 0 auto; /* Added 4% height margin above cards */
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 20px; 
            flex-shrink: 0;
            z-index: 2;
        }

        /* Responsive Scrollbar */
        .selection-wrapper::-webkit-scrollbar { height: 6px; }
        .selection-wrapper::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #2b3a67; border-radius: 10px; }

        .selection-container {
            display: flex;
            gap: 2vw; /* Gap scales with screen width */
            padding: 10px 0;
            min-width: min-content;
        }

        /* DYNAMIC CARDS */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: clamp(20px, 3vh, 40px); /* Padding shrinks on smaller screens */
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: clamp(240px, 20vw, 300px); /* Width scales between 240px and 300px */
            flex-shrink: 0;
        }

        /* 65% POSITIONING LOGIC */
        /* This pushes the content up so it sits roughly 65% from the bottom */
        .bottom-spacer { 
            flex-grow: 1; 
            min-height: 25vh; /* This ensures there's always "dead space" at the bottom */
        }

        .icon-circle { 
            width: clamp(50px, 7vh, 85px); 
            height: clamp(50px, 7vh, 85px); 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 2vh; 
            font-size: clamp(1.5rem, 3vh, 2.5rem); 
        }
        
        .card-title { font-size: clamp(0.9rem, 2vh, 1.2rem); font-weight: bold; margin-bottom: 0.5vh; text-transform: uppercase; }
        .card-desc { font-size: 0.85rem; opacity: 0.5; margin-bottom: 1.5vh; height: 3em; overflow: hidden; line-height: 1.2; }
        
        .btn-enter { 
            padding: 1vh 2.5vw; 
            border-radius: 30px; border: none; 
            background: #2b3a67; color: white; 
            font-weight: bold; cursor: pointer; 
            text-transform: uppercase; font-size: 0.8rem; 
        }
        
        .disabled { opacity: 0.3; filter: grayscale(1); }
        .status-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 1vh; text-transform: uppercase; }
        
        .admin-secret-btn { position: fixed; bottom: 15px; left: 15px; width: 14px; height: 14px; background: #dc3545; border: none; border-radius: 50%; cursor: pointer; opacity: 0.05; }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>Terminal Access</h1>
        <p>Initialize Secure Department Session</p>
    </div>

    <div class="selection-wrapper">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];

            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const container = document.getElementById('main-container');
            container.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
