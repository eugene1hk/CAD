<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        /* Lock the page vertically to prevent up/down scrolling */
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        /* Compressed Header Space */
        .header-section { 
            text-align: center; 
            padding-top: 20px; /* Reduced from 60px */
            margin-bottom: 10px; /* Reduced from 20px */
            flex-shrink: 0;
        }
        
        .header-section h1 { 
            margin: 5px 0; 
            font-size: 1.8rem; 
            letter-spacing: 4px; 
        }
        
        .header-section p { 
            margin: 0; 
            font-size: 0.9rem; 
            opacity: 0.7; 
        }
        
        /* THE SCROLL WRAPPER (Now positioned higher) */
        .selection-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 15px; /* Space for the scrollbar */
            margin-top: 10px;
            display: flex;
        }

        /* Scrollbar Styling - Positioned right under cards */
        .selection-wrapper::-webkit-scrollbar { height: 10px; }
        .selection-wrapper::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #2b3a67; border-radius: 10px; border: 2px solid #0b0b0b; }
        .selection-wrapper::-webkit-scrollbar-thumb:hover { background: #3c6e71; }

        .selection-container {
            display: flex;
            gap: 20px;
            padding: 10px 40px; /* Reduced vertical padding */
            min-width: min-content;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px; /* Compressed from 40px */
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 260px;
            flex-shrink: 0;
        }

        .login-card:not(.disabled):hover { transform: translateY(-5px); border-color: #3c6e71; background: rgba(255, 255, 255, 0.1); }
        
        /* Smaller Icons to save vertical space */
        .icon-circle { width: 60px; height: 60px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 2em; }
        
        .card-title { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; text-transform: uppercase;}
        .card-desc { font-size: 0.8rem; opacity: 0.6; margin-bottom: 10px; height: 35px; overflow: hidden; }
        
        .btn-enter { padding: 8px 25px; border-radius: 30px; border: none; background: #2b3a67; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        
        .disabled { opacity: 0.4; filter: grayscale(1); }
        .status-tag { font-size: 0.65rem; font-weight: bold; margin-bottom: 10px; }
        
        /* Secret Admin remains at the very edge */
        .admin-secret-btn { position: fixed; bottom: 10px; left: 10px; width: 12px; height: 12px; background: #dc3545; border: none; border-radius: 50%; cursor: pointer; opacity: 0.1; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 70px; border-radius: 50%; border: 2px solid #3c6e71;">
        <h1>TERMINAL ACCESS</h1>
        <p>Dynamic Department Selection</p>
    </div>

    <div class="selection-wrapper">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        // ... (Script remains exactly the same as your previous version)
        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];

            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const container = document.getElementById('main-container');
            
            container.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
