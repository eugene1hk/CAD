<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0b0b0b;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header-section {
            text-align: center;
            margin-top: 40px;
            flex-shrink: 0;
        }
        .header-section img { width: 100px; border-radius: 50%; border: 3px solid #3c6e71; }
        .header-section h1 { margin-top: 15px; letter-spacing: 3px; font-size: 1.8em; }
        .header-section p { opacity: 0.6; font-size: 0.9em; }

        .selection-wrapper {
            width: 90%;
            margin: 20px auto 0 auto;
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 5px; 
            flex-shrink: 0;
        }

        .selection-wrapper::-webkit-scrollbar { height: 5px; }
        .selection-wrapper::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.01); }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }

        .selection-container {
            display: flex;
            gap: 20px;
            padding: 15px 30px;
            min-width: min-content;
        }

        /* 0.8x SCALED CARD */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 32px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 280px; 
            width: 224px;      
            flex-shrink: 0;
            position: relative;
            overflow: hidden; /* Clips the grayscale overlay */
        }

        /* THE MAINTENANCE OVERLAY: This grays out the card WITHOUT touching the text */
        .login-card.disabled::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: grayscale(1);
            z-index: 1; /* Sits above background but below text */
            pointer-events: none;
        }

        .login-card:not(.disabled):hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #3c6e71;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
        }

        /* Ensure all content sits above the grayscale overlay */
        .login-card > * {
            position: relative;
            z-index: 2;
        }

        .icon-circle {
            width: 65px; height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; font-size: 2em;
        }

        .card-title { font-size: 1.2em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-desc { font-size: 0.8em; opacity: 0.6; margin-bottom: 12px; height: 35px; line-height: 1.3;}

        .btn-enter {
            margin-top: 12px; padding: 8px 32px;
            border-radius: 25px; border: none;
            background: #2b3a67; color: white;
            font-weight: bold; text-transform: uppercase;
            cursor: pointer; font-size: 0.75em;
            transition: 0.2s;
        }
        .btn-enter:hover { background: #3c6e71; }

        /* YELLOW TEXT FIX */
        .status-tag {
            font-size: 0.7em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 8px;
            z-index: 10; /* Highest priority */
        }

        .maintenance-text {
            color: #ffbc00 !important;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .admin-secret-btn {
            position: fixed; bottom: 10px; left: 10px;
            width: 12px; height: 12px;
            background: #dc3545; border: none; border-radius: 50%;
            cursor: pointer; opacity: 0.2; z-index: 1000;
        }

        .bottom-spacer { flex-grow: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="LRP Logo">
        <h1>TERMINAL ACCESS</h1>
        <p>Select your department to begin your session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container"></div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                const isMouse = Math.abs(e.deltaY) >= 100;
                const scrollSpeed = isMouse ? 180 : Math.abs(e.deltaY) * 9;
                const direction = e.deltaY > 0 ? 1 : -1;
                scrollContainer.scrollLeft -= (direction * scrollSpeed);
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const depts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
            ];
            
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc}</div>
                    <div class="status-tag ${isLocked ? 'maintenance-text' : ''}" 
                         style="color: ${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance In Progress' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }
        window.onload = renderHub;
    </script>
</body>
</html>
