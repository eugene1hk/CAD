<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC | Terminal Management</title>
    <style>
        :root {
            --primary: #3c6e71;
            --bg: #0b0b0b;
            --card: rgba(255, 255, 255, 0.05);
            --accent: #2b3a67;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 1000px; margin: auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* TAB SYSTEM */
        .tab-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ADD SECTION */
        .add-form {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            align-items: end;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.75em; color: var(--primary); font-weight: bold; text-transform: uppercase; }
        
        input {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 20px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add { background: var(--primary); color: white; }
        .btn-delete { background: #dc3545; color: white; padding: 5px 12px; }
        .toggle-btn { width: 140px; }
        .status-online { background: #4ade80; color: #000; }
        .status-maint { background: #ffbc00; color: #000; }

        /* TABLE */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: rgba(255,255,255,0.1); text-align: left; padding: 15px; font-size: 0.8em; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .nav-link { color: var(--primary); text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>STORM CAD | Backend</h1>
        <a href="option.html" class="nav-link">← TERMINAL EXIT</a>
    </div>

    <div class="tab-container">
        <button class="tab-btn" onclick="openTab('status-tab')">Live Status</button>
        <button class="tab-btn active" onclick="openTab('system-controls')">System Controls</button>
    </div>

    <div id="status-tab" class="tab-content">
        <h3>Overview</h3>
        <p>Manage which departments are currently visible and active on the main terminal.</p>
        <div id="status-overview"></div>
    </div>

    <div id="system-controls" class="tab-content active">
        <h3>Department Management</h3>
        
        <div class="add-form">
            <div class="input-group">
                <label>ID (Shortname)</label>
                <input type="text" id="new-id" placeholder="e.g. fire">
            </div>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="new-name" placeholder="e.g. Fire Dept">
            </div>
            <div class="input-group">
                <label>Icon</label>
                <input type="text" id="new-icon" placeholder="🚒">
            </div>
            <div class="input-group">
                <label>URL</label>
                <input type="text" id="new-url" placeholder="fire.html">
            </div>
            <div class="input-group">
                <label>Description</label>
                <input type="text" id="new-desc" placeholder="Dispatch Logs...">
            </div>
            <button class="btn btn-add" onclick="addDepartment()">+ ADD NEW</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Icon</th>
                    <th>Department</th>
                    <th>System State</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="dept-list"></tbody>
        </table>
    </div>
</div>

<script>
    // Initial data if nothing exists in storage
    const defaultDepts = [
        { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
        { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
        { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
        { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
    ];

    // TAB LOGIC
    function openTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // CORE DATA FUNCTIONS
    function getDepts() {
        const saved = localStorage.getItem('master_dept_list');
        return saved ? JSON.parse(saved) : defaultDepts;
    }

    function saveDepts(list) {
        localStorage.setItem('master_dept_list', JSON.stringify(list));
        renderAdmin();
    }

    // ADD FUNCTION
    function addDepartment() {
        const id = document.getElementById('new-id').value.trim();
        const name = document.getElementById('new-name').value.trim();
        const icon = document.getElementById('new-icon').value.trim();
        const url = document.getElementById('new-url').value.trim();
        const desc = document.getElementById('new-desc').value.trim();

        if(!id || !name) return alert("Error: ID and Name are required!");

        const list = getDepts();
        list.push({ id, name, icon, url, desc });
        saveDepts(list);

        // Clear Form
        document.querySelectorAll('.add-form input').forEach(input => input.value = '');
    }

    // DELETE FUNCTION
    function deleteDept(index) {
        if(!confirm("WARNING: This will permanently remove this department from the terminal. Continue?")) return;
        const list = getDepts();
        list.splice(index, 1);
        saveDepts(list);
    }

    // TOGGLE MAINTENANCE
    function toggleStatus(id) {
        const current = localStorage.getItem(id + "_locked") === "true";
        localStorage.setItem(id + "_locked", !current);
        renderAdmin();
    }

    // RENDER THE INTERFACE
    function renderAdmin() {
        const list = getDepts();
        const tbody = document.getElementById('dept-list');
        tbody.innerHTML = '';

        list.forEach((dept, index) => {
            const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size: 1.5em;">${dept.icon}</td>
                <td>
                    <strong>${dept.name}</strong><br>
                    <small style="opacity:0.5">${dept.url}</small>
                </td>
                <td>
                    <button class="btn toggle-btn ${isLocked ? 'status-maint' : 'status-online'}" 
                            onclick="toggleStatus('${dept.id}')">
                        ${isLocked ? 'MAINTENANCE' : 'ONLINE'}
                    </button>
                </td>
                <td>
                    <button class="btn btn-delete" onclick="deleteDept(${index})">DELETE</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.onload = renderAdmin;
</script>

</body>
</html>
