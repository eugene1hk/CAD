<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        /* 1. RESET & BODY */
        * { box-sizing: border-box; }
        body {
            background-color: #0b0b0b !important;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        /* 2. COMPACT HEADER */
        .header-section {
            text-align: center;
            margin-top: 20px; /* Very small top margin */
            flex-shrink: 0;
        }
        .header-section img { width: 70px; border-radius: 50%; border: 2px solid #3c6e71; }
        .header-section h1 { margin: 5px 0; letter-spacing: 2px; font-size: 1.4em; }
        .header-section p { opacity: 0.5; font-size: 0.8em; margin: 0; }

        /* 3. THE HARD-WORKED SCROLLBAR AREA */
        .selection-wrapper {
            width: 95%;
            margin: 15px auto 0 auto;
            overflow-x: auto !important; /* Force horizontal scroll */
            overflow-y: hidden;
            padding-bottom: 20px; /* Space for the scrollbar to actually show */
            flex-shrink: 0;
            z-index: 999;
            display: block !important;
        }

        /* Scrollbar Visual Style */
        .selection-wrapper::-webkit-scrollbar { height: 10px !important; display: block !important; }
        .selection-wrapper::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #4a5568 !important; border-radius: 10px; border: 1px solid #718096; }

        .selection-container {
            display: flex;
            gap: 20px;
            padding: 10px 20px;
            width: max-content; /* Critical for horizontal layout */
        }

        /* 4. 0.8x SCALED BOXES */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 260px; 
            width: 220px; /* 0.8x Scale */
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .login-card:not(.disabled):hover {
            transform: translateY(-5px);
            border-color: #3c6e71;
        }

        /* 5. YELLOW MAINTENANCE FIX */
        .login-card.disabled {
            background: rgba(20, 20, 20, 0.8) !important; /* Manual darkening */
            cursor: not-allowed;
        }

        .status-tag {
            font-size: 0.7em;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* Forced Yellow - No filters can touch this */
        .maint-yellow {
            color: #ffcc00 !important; 
            opacity: 1 !important;
        }

        .online-green { color: #4ade80 !important; }

        .icon-circle {
            width: 55px; height: 55px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 12px; font-size: 1.8em;
        }
        .disabled .icon-circle { opacity: 0.2; }

        .card-title { font-size: 1.1em; font-weight: bold; margin-bottom: 5px; }
        .card-desc { font-size: 0.75em; opacity: 0.5; height: 35px; overflow: hidden; }

        .btn-enter {
            margin-top: 10px; padding: 8px 25px;
            border-radius: 20px; border: none;
            background: #2b3a67; color: white;
            font-weight: bold; cursor: pointer; font-size: 0.7em;
        }

        .admin-secret-btn {
            position: fixed; bottom: 10px; left: 10px;
            width: 12px; height: 12px;
            background: #dc3545; border: none; border-radius: 50%;
            opacity: 0.2; z-index: 1000;
        }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>TERMINAL ACCESS</h1>
        <p>Select your department to begin your session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container"></div>
    </div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        // --- FULL SCROLL & TOUCH LOGIC ---
        scrollContainer.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                const isMouse = Math.abs(e.deltaY) >= 100;
                const scrollSpeed = isMouse ? 220 : Math.abs(e.deltaY) * 12;
                const direction = e.deltaY > 0 ? 1 : -1;

                scrollContainer.scrollLeft -= (direction * scrollSpeed);
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const depts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
            ];
            
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc}</div>
                    <div class="status-tag ${isLocked ? 'maint-yellow' : 'online-green'}">
                        ● ${isLocked ? 'Maintenance In Progress' : 'System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }
        window.onload = renderHub;
    </script>
</body>
</html>
