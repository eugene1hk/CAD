<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        body { background-color: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; min-height: 100vh; overflow: hidden; }
        .sidebar { width: 250px; background-color: #1a1a1a; border-right: 1px solid #333; padding: 20px; display: flex; flex-direction: column; }
        .nav-tabs { display: flex; flex-direction: column; gap: 5px; margin-top: 30px; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 12px 15px; text-align: left; border-radius: 6px; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; gap: 10px; }
        .tab-btn.active { background: #2b3a67; color: #fff; }
        .main-panel { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active-tab { display: block; }
        
        /* Dept Manager Styling */
        .admin-box { background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input, select { background: #080808; border: 1px solid #333; color: white; padding: 10px; border-radius: 5px; margin-right: 10px; }
        .btn-add { background: #2ecc71; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        
        .dept-list-item { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px 15px; border-radius: 5px; margin-bottom: 8px; }
        .btn-delete { background: #e74c3c; border: none; color: white; padding: 5px 10px; border-radius: 3px; cursor: pointer; }
        
        h1 { font-size: 1.6rem; margin: 0; }
        h2 { font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="text-align: center;">
            <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 65px; border-radius: 50%; border: 2px solid #3c6e71;">
            <h3>STORM BACKEND</h3>
        </div>
        <nav class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('controls', this)">⚙️ Dept Manager</button>
            <button class="tab-btn" onclick="window.location.href='database.html'">📂 Master Database</button>
            <button class="tab-btn" onclick="switchTab('logs', this)">📜 System Logs</button>
        </nav>
        <button style="margin-top:auto; background:#c0392b; color:white; border:none; padding:10px; cursor:pointer;" onclick="window.location.href='option.html'">Exit</button>
    </div>

    <div class="main-panel">
        <div id="controls" class="tab-content active-tab">
            <h1>Department Manager</h1>
            <h2>Add or Remove Terminal Access</h2>
            
            <div class="admin-box">
                <b>Add New Department:</b><br><br>
                <input type="text" id="new-dept-name" placeholder="Name (e.g. Coast Guard)">
                <input type="text" id="new-dept-icon" placeholder="Emoji (e.g. 🚢)" style="width: 80px;">
                <input type="text" id="new-dept-url" placeholder="Page (e.g. cg.html)">
                <button class="btn-add" onclick="addDepartment()">+ Add Department</button>
            </div>

            <div id="dept-list-container">
                </div>
        </div>
    </div>

    <script>
        // Default list if empty
        const defaultDepts = [
            { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
            { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
            { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
            { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
        ];

        function getDepts() {
            const saved = localStorage.getItem("lrp_departments");
            return saved ? JSON.parse(saved) : defaultDepts;
        }

        function renderDepts() {
            const depts = getDepts();
            const container = document.getElementById('dept-list-container');
            container.innerHTML = "<h2>Active Departments</h2>";
            
            depts.forEach((dept, index) => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                container.innerHTML += `
                    <div class="dept-list-item">
                        <span>${dept.icon} <b>${dept.name}</b> (${dept.url})</span>
                        <div>
                            <button onclick="toggleLock('${dept.id}')" style="background:${isLocked ? '#ffbc00':'#4ade80'}; border:none; padding:5px 10px; border-radius:3px; cursor:pointer; margin-right:10px;">
                                ${isLocked ? 'Maintenance' : 'Online'}
                            </button>
                            <button class="btn-delete" onclick="deleteDept(${index})">Delete</button>
                        </div>
                    </div>
                `;
            });
        }

        function addDepartment() {
            const name = document.getElementById('new-dept-name').value;
            const icon = document.getElementById('new-dept-icon').value;
            const url = document.getElementById('new-dept-url').value;
            if(!name || !url) return alert("Fill in name and url");

            const depts = getDepts();
            const id = name.toLowerCase().replace(/\s+/g, '-');
            depts.push({ id, name, icon: icon || '📁', url, desc: 'Authorized Personnel Only' });
            localStorage.setItem("lrp_departments", JSON.stringify(depts));
            renderDepts();
        }

        function deleteDept(index) {
            const depts = getDepts();
            depts.splice(index, 1);
            localStorage.setItem("lrp_departments", JSON.stringify(depts));
            renderDepts();
        }

        function toggleLock(id) {
            const current = localStorage.getItem(id + "_locked");
            localStorage.setItem(id + "_locked", current === "true" ? "false" : "true");
            renderDepts();
        }

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active-tab');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        window.onload = renderDepts;
    </script>
</body>
</html>
