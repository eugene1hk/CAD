<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .top-spacer { height: 10vh; flex-shrink: 0; }
        .header-section { text-align: center; flex-shrink: 0; z-index: 5; }
        .header-section img { width: 80px; border-radius: 50%; border: 2px solid #3c6e71; margin-bottom: 12px; }
        .header-section h1 { margin: 0; font-size: 2.1rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; }
        .header-section p { margin: 4px 0 0 0; font-size: 1rem; opacity: 0.5; letter-spacing: 1.5px; }
        
        .selection-wrapper {
            width: 85%; 
            margin: 35px auto 0 auto; 
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 20px; 
            flex-shrink: 0;
            z-index: 10;
            /* Using 'smooth' here helps sync the staggered mouse wheel ticks */
            scroll-behavior: smooth; 
        }

        /* SCROLLBAR SYSTEM */
        .selection-wrapper::-webkit-scrollbar { 
            height: 6px; 
            transition: all 0.2s ease;
        }

        .selection-wrapper::-webkit-scrollbar-track { 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 10px;
        }

        .selection-wrapper::-webkit-scrollbar-thumb { 
            background: #4a5568; 
            border-radius: 10px;
        }

        /* Hover logic restricted to the bar area */
        .selection-wrapper::-webkit-scrollbar:hover { height: 16px; }
        .selection-wrapper::-webkit-scrollbar-thumb:hover { background: #718096; }

        .selection-container {
            display: flex;
            gap: 32px;
            padding: 15px 0;
            min-width: min-content;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px; 
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
            flex-shrink: 0;
        }

        .login-card:not(.disabled):hover { 
            transform: translateY(-8px); 
            background: rgba(255, 255, 255, 0.06);
            border-color: #3c6e71;
        }

        .icon-circle { width: 75px; height: 75px; background: rgba(255, 255, 255, 0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 2.6rem; }
        .card-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-desc { font-size: 0.9rem; opacity: 0.45; margin-bottom: 20px; height: 42px; line-height: 1.3; }
        .btn-enter { padding: 12px 35px; border-radius: 40px; border: none; background: #2b3a67; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; }

        .bottom-spacer { flex-grow: 1; pointer-events: none; }
        
        .admin-secret-btn { 
            position: fixed; bottom: 20px; left: 20px; width: 16px; height: 16px; 
            background: #dc3545; border: none; border-radius: 50%; cursor: pointer; 
            opacity: 0.15; z-index: 999; transition: opacity 0.3s;
        }
        .admin-secret-btn:hover { opacity: 0.6; }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>Terminal Access</h1>
        <p>Select Department to Initialize Session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        // SYNCED SCROLL LOGIC
        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                // Normalize the speed: 
                // Touchpads usually have small deltaY (1-10)
                // Mice usually have large deltaY (100+)
                // We use a mathematical sign check to keep it consistent
                const speedMultiplier = 1.8; 
                const direction = e.deltaY > 0 ? 1 : -1;
                
                // If it's a mouse (huge jump), we dampen it. 
                // If it's a touchpad (tiny jump), we let it flow.
                const scrollAmount = Math.abs(e.deltaY) > 50 ? 150 : Math.abs(e.deltaY) * 8;

                scrollContainer.scrollLeft -= (direction * scrollAmount * speedMultiplier / 5);
                
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];
            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 
            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
