<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .top-spacer { height: 10vh; flex-shrink: 0; }

        .header-section { text-align: center; flex-shrink: 0; }
        .header-section img { width: 80px; border-radius: 50%; border: 2px solid #3c6e71; margin-bottom: 12px; }
        .header-section h1 { margin: 0; font-size: 2.1rem; letter-spacing: 5px; text-transform: uppercase; font-weight: 700; }
        .header-section p { margin: 4px 0 0 0; font-size: 1rem; opacity: 0.5; letter-spacing: 1.5px; }
        
        /* THE SELECTION WRAPPER */
        .selection-wrapper {
            width: 85%; 
            margin: 35px auto 0 auto; 
            overflow-x: auto;
            overflow-y: hidden;
            /* Large invisible padding creates a wide detection zone for the scrollbar */
            padding-bottom: 60px; 
            flex-shrink: 0;
            /* Ensures wheel scrolling feels buttery smooth */
            scroll-behavior: smooth; 
        }

        /* THE "POP" SCROLLBAR ANIMATION */
        .selection-wrapper::-webkit-scrollbar { 
            height: 4px; /* Start very thin */
            transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .selection-wrapper::-webkit-scrollbar-track { 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 10px;
        }

        .selection-wrapper::-webkit-scrollbar-thumb { 
            background: rgba(43, 58, 103, 0.5); 
            border-radius: 10px;
            transition: background 0.3s ease;
        }

        /* When the mouse is anywhere in the wrapper area, the bar "Pops" noticeably */
        .selection-wrapper:hover::-webkit-scrollbar { 
            height: 16px; /* Noticeable enlargement */
        }

        .selection-wrapper:hover::-webkit-scrollbar-thumb { 
            background: #2b3a67;
            border: 3px solid #0b0b0b; /* Makes the bar look thicker and more "solid" */
        }

        .selection-wrapper::-webkit-scrollbar-thumb:hover {
            background: #3c6e71; /* Highlight when actually touching the bar */
        }

        .selection-container {
            display: flex;
            gap: 32px;
            padding: 15px 0;
            min-width: min-content;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 35px; 
            text-align: center;
            transition: all 0.35s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
            flex-shrink: 0;
        }

        .login-card:not(.disabled):hover { 
            transform: translateY(-10px); 
            background: rgba(255, 255, 255, 0.06);
            border-color: #3c6e71;
        }

        .icon-circle { 
            width: 75px; 
            height: 75px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 20px; font-size: 2.6rem; 
        }
        
        .card-title { font-size: 1.25rem; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        .card-desc { font-size: 0.9rem; opacity: 0.45; margin-bottom: 20px; height: 42px; line-height: 1.3; }
        
        .btn-enter { 
            padding: 12px 35px; border-radius: 40px; border: none; 
            background: #2b3a67; color: white; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; font-size: 0.85rem; 
        }

        .bottom-spacer { flex-grow: 1; max-height: 30vh; }
        .status-tag { font-size: 0.7rem; font-weight: bold; margin-bottom: 12px; text-transform: uppercase; }
        .disabled { opacity: 0.25; filter: grayscale(1); }
        .admin-secret-btn { position: fixed; bottom: 15px; left: 15px; width: 14px; height: 14px; background: #dc3545; border: none; border-radius: 50%; cursor: pointer; opacity: 0.03; }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>Terminal Access</h1>
        <p>Select Department to Initialize Session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        // TRANSLATE UP/DOWN SCROLL TO LEFT/RIGHT
        const container = document.getElementById('scroll-container');

        container.addEventListener('wheel', (e) => {
            if (e.deltaY !== 0) {
                // If the user scrolls vertically, move horizontally instead
                container.scrollLeft += e.deltaY;
                e.preventDefault(); // Stop the actual page from trying to scroll up/down
            }
        });

        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];
            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 
            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
