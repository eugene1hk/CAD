<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC | Terminal Management</title>
    <style>
        :root {
            --primary: #3c6e71;
            --bg: #0b0b0b;
            --card: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 40px;
        }

        .container { max-width: 900px; margin: auto; }
        
        h1 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; }

        /* ADD FORM */
        .add-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 2fr auto;
            gap: 10px;
            align-items: end;
        }

        .add-section div { display: flex; flex-direction: column; font-size: 0.8em; color: var(--primary); font-weight: bold; }
        
        input, select {
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
        }

        .btn-add {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* TABLE STYLES */
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; }
        th { background: rgba(255,255,255,0.1); text-align: left; padding: 15px; }
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .btn-delete { background: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        .toggle-btn { padding: 5px 10px; border-radius: 4px; cursor: pointer; border: none; font-weight: bold; }
        
        .status-online { background: #4ade80; color: #000; }
        .status-maint { background: #ffbc00; color: #000; }

        .nav-link { color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <a href="option.html" class="nav-link">← Back to Selection Terminal</a>
    <h1>System Management</h1>

    <div class="add-section">
        <div>ID (e.g. fire) <input type="text" id="new-id" placeholder="id"></div>
        <div>Name <input type="text" id="new-name" placeholder="Department Name"></div>
        <div>Icon <input type="text" id="new-icon" placeholder="🚓"></div>
        <div>URL <input type="text" id="new-url" placeholder="page.html"></div>
        <button class="btn-add" onclick="addDepartment()">ADD</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Icon</th>
                <th>Department Name</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="dept-list">
            </tbody>
    </table>
</div>

<script>
    // Default starting list if localstorage is empty
    const defaultDepts = [
        { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html' },
        { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html' },
        { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html' },
        { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html' }
    ];

    function getDepts() {
        const saved = localStorage.getItem('master_dept_list');
        return saved ? JSON.parse(saved) : defaultDepts;
    }

    function saveDepts(list) {
        localStorage.setItem('master_dept_list', JSON.stringify(list));
        renderAdmin();
    }

    function addDepartment() {
        const id = document.getElementById('new-id').value;
        const name = document.getElementById('new-name').value;
        const icon = document.getElementById('new-icon').value;
        const url = document.getElementById('new-url').value;

        if(!id || !name) return alert("Fill in ID and Name");

        const list = getDepts();
        list.push({ id, name, icon, url });
        saveDepts(list);

        // Clear inputs
        document.getElementById('new-id').value = '';
        document.getElementById('new-name').value = '';
    }

    function deleteDept(index) {
        if(!confirm("Are you sure you want to delete this department?")) return;
        const list = getDepts();
        list.splice(index, 1);
        saveDepts(list);
    }

    function toggleStatus(id) {
        const current = localStorage.getItem(id + "_locked") === "true";
        localStorage.setItem(id + "_locked", !current);
        renderAdmin();
    }

    function renderAdmin() {
        const list = getDepts();
        const tbody = document.getElementById('dept-list');
        tbody.innerHTML = '';

        list.forEach((dept, index) => {
            const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
            
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-size: 1.5em;">${dept.icon}</td>
                <td><strong>${dept.name}</strong><br><small style="opacity:0.5">${dept.url}</small></td>
                <td>
                    <button class="toggle-btn ${isLocked ? 'status-maint' : 'status-online'}" 
                            onclick="toggleStatus('${dept.id}')">
                        ${isLocked ? 'MAINTENANCE' : 'ONLINE'}
                    </button>
                </td>
                <td>
                    <button class="btn-delete" onclick="deleteDept(${index})">Delete</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    window.onload = renderAdmin;
</script>

</body>
</html>
