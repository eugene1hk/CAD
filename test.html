<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRP | Master Backend Control</title>
    <style>
        /* Sonoran CAD Black Aesthetic */
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Navigation */
        .sidebar {
            width: 240px;
            background-color: #1a1a1a;
            border-right: 1px solid #333;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .sidebar h3 {
            margin-top: 10px;
            font-size: 0.9rem;
            text-align: center;
        }

        /* TAB STYLING */
        .nav-tabs {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
        }

        .tab-btn {
            background: transparent;
            color: #888;
            border: none;
            padding: 12px 15px;
            text-align: left;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
        }

        .tab-btn.active {
            background: #2b3a67; /* London Blue */
            color: #fff;
        }

        .main-panel {
            flex-grow: 1;
            padding: 30px;
        }

        /* Content Area Visibility */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        h1 { color: #ffffff; font-size: 1.5rem; margin-bottom: 30px; letter-spacing: 1px; }
        h2 { color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; }

        /* Grid & Cards */
        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .control-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 25px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-info span { display: block; font-weight: bold; font-size: 1.1rem; margin-bottom: 5px; }
