<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .top-spacer { height: 8vh; flex-shrink: 0; }

        .header-section { text-align: center; flex-shrink: 0; z-index: 5; }
        .header-section img { width: 100px; border-radius: 50%; border: 2px solid #3c6e71; margin-bottom: 15px; }
        .header-section h1 { margin: 0; font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; }
        .header-section p { margin: 5px 0 0 0; font-size: 0.9rem; opacity: 0.6; }
        
        /* SCROLL AREA */
        .selection-wrapper {
            width: 90%; 
            margin: 40px auto 0 auto; 
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 30px; 
            flex-shrink: 0;
            z-index: 10;
            scroll-behavior: auto; /* Fixed for high-precision JS control */
        }

        /* Scrollbar Visuals */
        .selection-wrapper::-webkit-scrollbar { height: 6px; }
        .selection-wrapper::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #4a5568; border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar:hover { height: 12px; }
        .selection-wrapper::-webkit-scrollbar-thumb:hover { background: #718096; }

        .selection-container {
            display: flex;
            gap: 25px; 
            padding: 10px 20px;
            min-width: min-content;
        }

        /* COMPRESSED BOX SIZE */
        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 30px 25px;
            text-align: center;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 270px;      /* Slightly narrower */
            height: 370px;     /* Shorter height for compactness */
            flex-shrink: 0;
        }

        .login-card:not(.disabled):hover { 
            transform: translateY(-6px); 
            background: rgba(255, 255, 255, 0.08);
            border-color: #3c6e71;
        }

        .icon-circle { 
            width: 70px; height: 70px; 
            background: rgba(255, 255, 255, 0.07); 
            border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            margin-bottom: 15px; font-size: 2.2em; 
        }
        
        .card-title { font-size: 1.25em; font-weight: bold; margin-bottom: 8px; text-transform: uppercase; }
        
        /* Compressed Description */
        .card-desc { 
            font-size: 0.85em; 
            opacity: 0.5; 
            margin-bottom: 15px; 
            height: 38px; 
            line-height: 1.3; 
            overflow: hidden;
        }
        
        /* Compressed Status Tag */
        .status-tag { 
            font-size: 0.7em; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            margin-top: auto; 
            margin-bottom: 12px;
        }

        .btn-enter { 
            padding: 10px 0; 
            width: 85%; 
            border-radius: 25px; 
            border: none; 
            background: #2b3a67; 
            color: white; 
            font-weight: bold; 
            text-transform: uppercase; 
            cursor: pointer; 
            font-size: 0.85rem;
            transition: 0.2s;
        }
        .btn-enter:hover { background: #3c6e71; }

        .bottom-spacer { flex-grow: 1; pointer-events: none; }
        .disabled { opacity: 0.4; filter: grayscale(1); cursor: not-allowed; }
        
        .admin-secret-btn { 
            position: fixed; bottom: 15px; left: 15px; width: 14px; height: 14px; 
            background: #dc3545; border: none; border-radius: 50%; cursor: pointer; 
            opacity: 0.2; z-index: 1000; transition: opacity 0.3s;
        }
    </style>
</head>
<body>

    <div class="top-spacer"></div>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo">
        <h1>TERMINAL ACCESS</h1>
        <p>Select your department to begin your session</p>
    </div>

    <div class="selection-wrapper" id="scroll-container">
        <div id="main-container" class="selection-container"></div>
    </div>

    <div class="bottom-spacer"></div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        const scrollContainer = document.getElementById('scroll-container');

        // LINEAR SYNC SCROLL (Anti-Jitter)
        scrollContainer.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 0) {
                // If deltaY is huge (Mouse), use a solid chunk.
                // If deltaY is small (Touchpad), use a direct multiplier for 1:1 feel.
                const isMouse = Math.abs(e.deltaY) >= 100;
                
                const scrollSpeed = isMouse ? 200 : Math.abs(e.deltaY) * 9;
                const direction = e.deltaY > 0 ? 1 : -1;

                // Move exactly where the input dictates
                scrollContainer.scrollLeft -= (direction * scrollSpeed);
                e.preventDefault(); 
            }
        }, { passive: false });

        function renderHub() {
            const depts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency & Transport MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character & Vehicle Registration' }
            ];
            
            const mainDiv = document.getElementById('main-container');
            mainDiv.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                mainDiv.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }
        window.onload = renderHub;
    </script>
</body>
</html>
