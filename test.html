<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LRPC STORM CAD | Selection Terminal</title>
    <style>
        body { 
            background-color: #0b0b0b; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; /* Keeps the screen locked */
        }
        
        /* Balanced Header - Not too tight, not too loose */
        .header-section { 
            text-align: center; 
            padding-top: 40px; 
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        
        .header-section h1 { 
            margin: 10px 0; 
            font-size: 2.2rem; 
            letter-spacing: 5px; 
            text-transform: uppercase;
        }
        
        .header-section p { 
            margin: 0; 
            font-size: 1rem; 
            opacity: 0.6; 
            letter-spacing: 1px;
        }
        
        /* THE SELECTION WRAPPER */
        .selection-wrapper {
            width: 80%; /* Sets the scrollbar area to 80% of the screen */
            margin: 0 auto; /* Centers the 80% width */
            overflow-x: auto;
            overflow-y: hidden;
            padding-bottom: 25px; 
            display: flex;
        }

        /* LOW PROFILE SCROLLBAR */
        .selection-wrapper::-webkit-scrollbar { height: 6px; }
        /* Track is now a subtle grey-tinted dark, not pure black */
        .selection-wrapper::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb { background: #2b3a67; border-radius: 10px; }
        .selection-wrapper::-webkit-scrollbar-thumb:hover { background: #3c6e71; }

        .selection-container {
            display: flex;
            gap: 30px; /* Large spacing between cards */
            padding: 20px 0; /* Vertical breathing room */
            min-width: min-content;
        }

        /* RESTORED LARGE CARDS */
        .login-card {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px; /* Back to original large padding */
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 280px;
            flex-shrink: 0;
        }

        .login-card:not(.disabled):hover { 
            transform: translateY(-12px); 
            border-color: #3c6e71; 
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .icon-circle { 
            width: 85px; 
            height: 85px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 50%; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 25px; 
            font-size: 2.8em; 
        }
        
        .card-title { font-size: 1.3em; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px;}
        .card-desc { font-size: 0.9rem; opacity: 0.5; margin-bottom: 20px; height: 45px; line-height: 1.4; }
        
        .btn-enter { 
            padding: 12px 35px; 
            border-radius: 30px; 
            border: none; 
            background: #2b3a67; 
            color: white; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-size: 0.85rem; 
            transition: 0.3s;
        }
        
        .btn-enter:hover { background: #3c6e71; letter-spacing: 1px; }
        
        .disabled { opacity: 0.3; filter: grayscale(1); }
        .status-tag { font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        
        .admin-secret-btn { position: fixed; bottom: 15px; left: 15px; width: 14px; height: 14px; background: #dc3545; border: none; border-radius: 50%; cursor: pointer; opacity: 0.05; }
    </style>
</head>
<body>

    <div class="header-section">
        <img src="LRPC_favicon_test.jpeg" alt="Logo" style="width: 90px; border-radius: 50%; border: 2px solid #3c6e71; margin-bottom: 10px;">
        <h1>Terminal Access</h1>
        <p>Select Department to Initialize Session</p>
    </div>

    <div class="selection-wrapper">
        <div id="main-container" class="selection-container">
            </div>
    </div>

    <button class="admin-secret-btn" onclick="window.location.href='backend.html'"></button>

    <script>
        // Use the same renderHub script from before
        function renderHub() {
            const defaultDepts = [
                { id: 'police', name: 'Law Enforcement', icon: '🚓', url: 'police.html', desc: 'MDT Access - MET Police Only' },
                { id: 'ems', name: 'Medical Service', icon: '🚑', url: 'fire.html', desc: 'Patient Care & Dispatch Logs' },
                { id: 'dot', name: 'DOT', icon: '🚧', url: 'dot.html', desc: 'Highways Agency MDT' },
                { id: 'civ', name: 'Civilian Portal', icon: '👤', url: 'civ.html', desc: 'Character Registration' }
            ];

            const saved = localStorage.getItem("lrp_departments");
            const depts = saved ? JSON.parse(saved) : defaultDepts;
            const container = document.getElementById('main-container');
            
            container.innerHTML = ""; 

            depts.forEach(dept => {
                const isLocked = localStorage.getItem(dept.id + "_locked") === "true";
                
                const card = document.createElement('div');
                card.className = `login-card ${isLocked ? 'disabled' : ''}`;
                card.innerHTML = `
                    <div class="icon-circle">${dept.icon}</div>
                    <div class="card-title">${dept.name}</div>
                    <div class="card-desc">${dept.desc || 'Authorized Personnel Only'}</div>
                    <div class="status-tag" style="color:${isLocked ? '#ffbc00' : '#4ade80'}">
                        ${isLocked ? '● Maintenance' : '● System Online'}
                    </div>
                    ${!isLocked ? `<button class="btn-enter" onclick="login('${dept.id}', '${dept.name}', '${dept.url}')">Enter</button>` : ''}
                `;
                container.appendChild(card);
            });
        }

        function login(id, name, url) {
            localStorage.setItem("selected_dept_id", id);
            localStorage.setItem("selected_dept_name", name);
            localStorage.setItem("selected_dept_url", url);
            window.location.href = 'login.html';
        }

        window.onload = renderHub;
    </script>
</body>
</html>
